<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AppNormal – Build Smarter</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-gray-50 text-gray-900">

  <header class="p-6 shadow bg-white">
    <h1 class="text-3xl font-bold">AppNormal</h1>
  </header>

  <main class="max-w-4xl mx-auto p-8">
    <section class="mb-12">
      <h2 class="text-4xl font-bold mb-4">Membership Plans</h2>
      <p class="text-lg mb-6">Choose the plan that fits your workflow.</p>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

        <!-- Starter -->
        <div class="p-6 bg-white shadow rounded">
          <h3 class="text-2xl font-semibold mb-2">Starter</h3>
          <p class="text-gray-600 mb-4">For light usage and testing.</p>
          <p class="text-3xl font-bold mb-4">$9/mo</p>
          <p class="mb-4">Includes <strong>100 credits</strong></p>
        </div>

        <!-- Creator -->
        <div class="p-6 bg-white shadow rounded">
          <h3 class="text-2xl font-semibold mb-2">Creator</h3>
          <p class="text-gray-600 mb-4">For active builders.</p>
          <p class="text-3xl font-bold mb-4">$19/mo</p>
          <p class="mb-4">Includes <strong>250 credits</strong></p>
        </div>

        <!-- Studio (UPDATED) -->
        <div class="p-6 bg-white shadow rounded border-2 border-blue-500">
          <h3 class="text-2xl font-semibold mb-2">Studio</h3>
          <p class="text-gray-600 mb-4">For serious creators and production apps.</p>
          <p class="text-3xl font-bold mb-4">$29/mo</p>
          <p class="mb-4">Includes <strong>500 credits</strong></p>
        </div>

      </div>
    </section>

    <section>
      <a href="/workspace.html" class="px-6 py-3 bg-blue-600 text-white rounded shadow">
        Go to Workspace
      </a>
    </section>
  </main>

</body>
</html>
