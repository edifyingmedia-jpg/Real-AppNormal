<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workspace – AppNormal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-gray-50 text-gray-900">

  <header class="p-6 shadow bg-white flex justify-between items-center">
    <h1 class="text-3xl font-bold">Workspace</h1>
    <a href="/index.html" class="text-blue-600 underline">Back to Plans</a>
  </header>

  <main class="max-w-4xl mx-auto p-8">

    <section class="mb-8">
      <h2 class="text-2xl font-semibold mb-2">Your Credits</h2>
      <p class="text-lg mb-4">
        Your membership includes <strong>500 monthly credits</strong>.
      </p>
      <div id="credit-balance" class="p-4 bg-white shadow rounded text-xl font-bold">
        Loading your credit balance…
      </div>
    </section>

    <section>
      <h2 class="text-2xl font-semibold mb-4">Build Something</h2>
      <button class="px-6 py-3 bg-blue-600 text-white rounded shadow">
        Generate App
      </button>
    </section>

  </main>

</body>
</html>
