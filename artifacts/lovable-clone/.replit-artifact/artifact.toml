kind = "web"
previewPath = "/"
title = "AI App Builder"
version = "1.0.0"
id = "artifacts/lovable-clone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24459

[services.development]
run = "pnpm --filter @workspace/lovable-clone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lovable-clone", "run", "build" ]
publicDir = "artifacts/lovable-clone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24459"
BASE_PATH = "/"
